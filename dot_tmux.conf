# my personal tmux configurations:

#  NOTE: remember that (Alt + s) saves file in neovim. Just reminding because both these keys are close :)

# Setting (Alt + a) as my prefix key:
set -g prefix M-a
unbind M-b
bind-key M-a send-prefix

# creating splits:
unbind %
bind | split-window -h # create horizontal split

unbind '"'
bind - split-window -v # create vertical split

# vim-like pane switching
# bind -r ^ last-window
# bind -r k select-pane -U
# bind -r j select-pane -D
# bind -r h select-pane -L
# bind -r l select-pane -R

# Resize panes using Prefix + Arrow Keys
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
# bind -r u resize-pane -L 5
# bind -r p resize-pane -R 5

# Unbind default resizing keys
# unbind-key  Left
# unbind-key  Right
# unbind-key  Up
# unbind-key  Down

# Resize without prefix
# bind-key -r Up resize-pane -U 5
# bind-key -r Down resize-pane -D 5
# bind-key -r Left resize-pane -L 5
# bind-key -r Right resize-pane -R 5

set -g mouse on # I can use mouse as well

# for using vim keybings in copy mode
setw -g mode-keys vi

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# plugins:
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'christoomey/vim-tmux-navigator' # lets me use vim keys to navigate b/w nvim and tmux

# tmux navigation bindings, again using alt + h,j,k,l for navigation, same as nvim
set -g @vim_navigator_mapping_left "M-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Explicitly unbind arrow keys (with and without prefix)
# unbind -n Up
# unbind -n Down
# unbind -n Left
# unbind -n Right

unbind Up
unbind Down
unbind Left
unbind Right

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
