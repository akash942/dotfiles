#HELLO THERE

mode "fullscreen" {
	bindsym $mod+k fullscreen disable focus right fullscreen enable
}

#cmd to set volume:
#amixer sset 'Master' 50%
#cmd to decrease volume:
#amixer sset 'Master' 10%-

#volume controls
bindsym XF86AudioRaiseVolume exec --no-startup-id amixer sset 'Master' 5%+ && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id amixer set 'Master' 5%- && $refresh_i3status
bindsym XF86AudioMute exec --no-startup-id amixer set 'Master' toggle && $refresh_i3status

#media controls
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPause exec playerctl play-pause

# boomer (the zoom tool made by zozin aka tsoding)
bindsym $mod+b exec "boomer"

#nitrogen for setting desktop wallpaper
exec --no-startup-id nitrogen --restore
#couldn't make terminal transparent without picom(light-weight compositor handles how windows should look)
exec --no-startup-id picom

workspace 2 gaps outer 10px
bindsym XF86MonBrightnessUp exec --no-startup-id xbacklight -inc 10
bindsym XF86MonBrightnessDown exec --no-startup-id xbacklight -dec 10

# using win + Tab to switch between tabs and go to fullscreen mode
bindsym $mod+Tab fullscreen disable; focus right; fullscreen enable
bindsym $mod+Shift+Tab fullscreen disable; focus left; fullscreen enable


assign [class="Google-chrome"] $ws1
assign [class="Ghostty"] $ws2
assign [class="Code"] $ws3
assign [class="Spotify"] $ws4
assign [class="Brave-browser"] $ws5

#Screenshot script
bindsym Print exec flameshot gui
exec_always google-chrome --force-device-scale-factor=1.1
#exec_always Code
# exec_always spotify
#exec_always Brave-browser

# remove top title and surrounding borders
default_border pixel 0
#for_window [class=".*"] title_format " "
#for_window [class="^.*"] border pixel 0

# polybar
exec_always --no-startup-id polybar
exec_always --no-startup-id $HOME/.config/polybar/launch.sh

#battery popup
exec --no-startup-id i3-battery-popup -n -L 42%

# this locks my keyboard, it will unlock when i enter my password:
bindsym $mod+F6 exec --no-startup-id xtrlock
